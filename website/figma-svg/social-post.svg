<svg width="450" height="1000" viewBox="0 0 450 1000" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <!-- Post card (dark X/Twitter theme) -->
  <rect width="450" height="1000" fill="#000000"/>
  <rect x="0.5" y="0.5" width="449" height="999" fill="none" stroke="#2f3336"/>

  <!-- Avatar -->
  <circle cx="52" cy="48" r="24" fill="#536471"/>
  <circle cx="52" cy="40" r="9" fill="#8899a6"/>
  <path d="M34 64 a18 16 0 0 1 36 0 Z" fill="#8899a6"/>

  <!-- Name row -->
  <text x="88" y="44" fill="#e7e9ea" font-size="16" font-weight="700">Jami</text>
  <!-- verified badge -->
  <circle cx="138" cy="39" r="8" fill="#1d9bf0"/>
  <path d="M134 39 l3 3 5-5" stroke="#fff" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="152" y="44" fill="#71767b" font-size="15">@expertwith_AI · 11h</text>
  <text x="420" y="44" fill="#71767b" font-size="18" text-anchor="end">···</text>

  <!-- Post text -->
  <text x="28" y="92" fill="#e7e9ea" font-size="15">You can make $3,400 per week, if you have:</text>
  <text x="28" y="122" fill="#e7e9ea" font-size="15">1. Internet</text>
  <text x="28" y="144" fill="#e7e9ea" font-size="15">2. Mobile</text>
  <text x="28" y="166" fill="#e7e9ea" font-size="15">3. 1 hour everyday</text>
  <text x="28" y="198" fill="#e7e9ea" font-size="15">I have prepared a guide for this. It's absolutely FREE:</text>
  <text x="28" y="228" fill="#e7e9ea" font-size="15">Like &amp; reply "Guide" and I'll DM you the document.</text>
  <text x="28" y="250" fill="#e7e9ea" font-size="15">(Must follow me to receive it)</text>

  <!-- Image card (the suspicious "cash balance" graphic) -->
  <rect x="28" y="272" width="320" height="260" rx="16" fill="#f7f9f9" stroke="#e1e8ed"/>
  <text x="188" y="340" fill="#0f1419" font-size="34" font-weight="800" text-anchor="middle">$3,400.00</text>
  <text x="188" y="364" fill="#536471" font-size="13" text-anchor="middle">Cash Balance</text>
  <text x="110" y="410" fill="#0f1419" font-size="14" font-weight="700" text-anchor="middle">041 215 663</text>
  <text x="110" y="428" fill="#536471" font-size="12" text-anchor="middle">Routing</text>
  <text x="266" y="410" fill="#0f1419" font-size="14" font-weight="700" text-anchor="middle">12 •••• ••••</text>
  <text x="266" y="428" fill="#536471" font-size="12" text-anchor="middle">Account</text>
  <rect x="48" y="452" width="130" height="40" rx="20" fill="#eff3f4"/>
  <text x="113" y="477" fill="#0f1419" font-size="13" font-weight="700" text-anchor="middle">Add Cash</text>
  <rect x="198" y="452" width="130" height="40" rx="20" fill="#eff3f4"/>
  <text x="263" y="477" fill="#0f1419" font-size="13" font-weight="700" text-anchor="middle">Cash Out</text>

  <!-- ===== Verilens action bar ===== -->
  <!-- brand chip -->
  <path d="M40 566 L34 568.5 v5 c0 4 2.5 6 6 7.5 c3.5-1.5 6-3.5 6-7.5 v-5 Z" fill="none" stroke="#e74c3c" stroke-width="1.6" stroke-linejoin="round"/>
  <text x="52" y="578" fill="#536471" font-size="13" font-weight="600">Verilens</text>

  <!-- Check media button (blue, primary) -->
  <rect x="128" y="558" width="150" height="36" rx="18" fill="#e8f5fd" stroke="#1d9bf0"/>
  <circle cx="152" cy="576" r="6" fill="none" stroke="#1d9bf0" stroke-width="1.6"/>
  <line x1="156" y1="580" x2="160" y2="584" stroke="#1d9bf0" stroke-width="1.6" stroke-linecap="round"/>
  <text x="172" y="581" fill="#1d9bf0" font-size="13.5" font-weight="600">Check media</text>

  <!-- Fact-check button (green, secondary) -->
  <rect x="290" y="558" width="146" height="36" rx="18" fill="#e9f7ef" stroke="#2ecc71"/>
  <rect x="306" y="569" width="14" height="12" rx="1.5" fill="none" stroke="#27ae60" stroke-width="1.4"/>
  <line x1="309" y1="573" x2="317" y2="573" stroke="#27ae60" stroke-width="1.2"/>
  <line x1="309" y1="577" x2="317" y2="577" stroke="#27ae60" stroke-width="1.2"/>
  <text x="328" y="581" fill="#27ae60" font-size="13.5" font-weight="600">Fact-check</text>

  <!-- Engagement row -->
  <g fill="#71767b" font-size="13">
    <text x="40" y="624">💬 552</text>
    <text x="150" y="624">🔁 78</text>
    <text x="250" y="624">♡ 480</text>
    <text x="360" y="624">📊 36K</text>
  </g>

  <!-- ================= Verilens Fact-check result (extension output) ================= -->
  <!-- This is the badge the extension injects after clicking "Fact-check". -->
  <g>
    <!-- section header -->
    <text x="28" y="668" fill="#71767b" font-size="11" font-weight="700" letter-spacing="0.6">FACT-CHECK · TEXT</text>
    <rect x="186" y="657" width="50" height="16" rx="8" fill="#16181c" stroke="#2f3336"/>
    <text x="211" y="669" fill="#8b98a5" font-size="10" text-anchor="middle">cached</text>

    <!-- overall verdict: Mixed (amber) -->
    <circle cx="34" cy="694" r="5" fill="#f39c12"/>
    <text x="46" y="699" fill="#f39c12" font-size="17" font-weight="700">Mixed</text>
    <text x="28" y="724" fill="#c8ccd0" font-size="13">The post mixes accurate and unsupported elements;</text>
    <text x="28" y="742" fill="#c8ccd0" font-size="13">key specifics remain in dispute.</text>

    <!-- Claim 1 card -->
    <rect x="20" y="758" width="410" height="148" rx="12" fill="#16181c" stroke="#2f3336"/>
    <rect x="36" y="774" width="96" height="22" rx="11" fill="rgba(243,156,18,0.15)"/>
    <text x="84" y="789" fill="#f39c12" font-size="11" font-weight="700" text-anchor="middle">DEVELOPING</text>
    <text x="414" y="789" fill="#8b98a5" font-size="12" font-weight="600" text-anchor="end">69% conf</text>
    <text x="36" y="820" fill="#e7e9ea" font-size="13">You can make $3,400 per week, if you have: 1. Internet</text>
    <text x="36" y="838" fill="#e7e9ea" font-size="13">2. Mobile 3. 1 hour everyday I have prepared a guide…</text>
    <text x="36" y="866" fill="#1d9bf0" font-size="13" font-weight="600">Associated Press<tspan fill="#8b98a5" font-weight="400"> — AP's review of the claim against primary records.</tspan></text>
    <text x="36" y="890" fill="#1d9bf0" font-size="13" font-weight="600">AFP Fact Check<tspan fill="#8b98a5" font-weight="400"> — AFP traced the original source of the assertion.</tspan></text>

    <!-- Claim 2 card -->
    <rect x="20" y="918" width="410" height="68" rx="12" fill="#16181c" stroke="#2f3336"/>
    <rect x="36" y="934" width="96" height="22" rx="11" fill="rgba(243,156,18,0.15)"/>
    <text x="84" y="949" fill="#f39c12" font-size="11" font-weight="700" text-anchor="middle">DEVELOPING</text>
    <text x="414" y="949" fill="#8b98a5" font-size="12" font-weight="600" text-anchor="end">59% conf</text>
    <text x="36" y="976" fill="#1d9bf0" font-size="13" font-weight="600">Reuters<tspan fill="#8b98a5" font-weight="400"> — Reuters reporting on the underlying figures and context.</tspan></text>
  </g>
</svg>
