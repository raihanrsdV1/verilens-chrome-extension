<svg width="900" height="600" viewBox="0 0 900 600" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <rect width="900" height="600" fill="#0e0f12"/>

  <!-- Card -->
  <rect x="270" y="120" width="360" height="360" rx="20" fill="#16181c" stroke="#2f3336"/>

  <!-- Shield icon -->
  <g transform="translate(422, 160)">
    <path d="M28 4 L8 11 v18 c0 15 10 25 20 30 c10-5 20-15 20-30 v-18 Z" fill="none" stroke="#1d9bf0" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M19 32 l6 6 12-12" fill="none" stroke="#1d9bf0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="450" y="270" fill="#e7e9ea" font-size="26" font-weight="700" text-anchor="middle">Welcome to Verilens Pro</text>
  <text x="450" y="300" fill="#8b98a5" font-size="15" text-anchor="middle">Thanks for upgrading — all premium detectors are now yours.</text>

  <!-- State pill (ok) -->
  <rect x="310" y="328" width="280" height="48" rx="12" fill="rgba(46,204,113,0.14)"/>
  <text x="450" y="357" fill="#2ecc71" font-size="15" font-weight="600" text-anchor="middle">Pro unlocked — open your feed and enjoy.</text>

  <!-- Back button -->
  <rect x="310" y="396" width="280" height="44" rx="10" fill="none" stroke="#2f3336"/>
  <text x="450" y="424" fill="#e7e9ea" font-size="15" font-weight="600" text-anchor="middle">Back to home</text>
</svg>
